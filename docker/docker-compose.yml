

services:
  spark:
    image: jupyter/pyspark-notebook:latest
    container_name: parcial_ml_2026
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ../notebooks:/home/jovyan/work
      - ../data:/home/jovyan/data
    environment:
      - JUPYTER_TOKEN=ml2026
      - JUPYTER_ENABLE_LAB=yes
    restart: unless-stopped
